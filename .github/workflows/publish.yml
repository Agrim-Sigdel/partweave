name: Publish to npm

# Publishes the `partweave` CLI to npm on a version tag. Auth is via npm
# Trusted Publishing (OIDC) — no NPM_TOKEN secret, and it's exempt from the
# account's 2FA/OTP requirement. Configure the trusted publisher once at:
#   npmjs.com -> partweave -> Settings -> Trusted Publisher
#   (GitHub Actions, repo Agrim-Sigdel/partweave, workflow file publish.yml).
# Cut a release with (the --workspace bump does NOT tag, so tag explicitly):
#   npm version patch --workspace partweave --no-git-tag-version
#   git commit -am "Release X.Y.Z" && git tag -a vX.Y.Z -m "X.Y.Z"
#   git push origin main --follow-tags
# The tag (vX.Y.Z) must match packages/cli/package.json version or the run fails fast.
on:
  push:
    tags:
      - "v*"

jobs:
  # Gate: generate real projects from the templates and run their tests. If any
  # generated app fails to typecheck/test/build, the release is blocked.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing (and provenance)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      # OIDC trusted publishing needs npm >= 11.5.1. Node 24 ships npm 11.x, so
      # only self-upgrade when the bundled npm is below the floor — avoids the
      # fragile npm 10 -> 11 jump that broke on the old Node 20 toolchain.
      - name: Ensure npm supports trusted publishing
        run: |
          have="$(npm --version)"
          if [ "$(printf '11.5.1\n%s\n' "$have" | sort -V | head -1)" != "11.5.1" ]; then
            echo "npm $have < 11.5.1 — upgrading"
            npm install -g npm@latest
          fi
          echo "npm $(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "✗ tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi
          echo "▸ Publishing partweave@$PKG"

      # Auth comes from OIDC (the id-token above) via the configured trusted
      # publisher — no token. `npm publish` runs prepack, which builds the CLI
      # and bundles modules/ + README + LICENSE; provenance is added automatically.
      - name: Publish
        run: npm publish --access public
        working-directory: packages/cli
